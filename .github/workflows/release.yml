# 当推送版本标签（如 1.0.0）时，自动构建桌面应用并创建 GitHub Release
name: 构建桌面应用 & Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+"               # 匹配 x.x 格式的标签
      - "[0-9]+.[0-9]+.[0-9]+"        # 匹配 x.x.x 格式的标签

permissions:
  contents: write                       # 需要创建 Release 和上传附件

jobs:
  build:
    name: 构建 Windows 桌面应用
    runs-on: windows-latest

    steps:
      # ---- 检出代码 ----
      - name: 检出代码
        uses: actions/checkout@v6

      # ---- 提取版本号 ----
      - name: 提取版本号
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=DocAI-Pipeline-${VERSION}-win-x64.zip" >> "$GITHUB_OUTPUT"
          # 写入 VERSION 文件供运行时读取
          echo "$VERSION" > ai-service/VERSION

      # ---- 安装 Node.js ----
      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      # ---- 构建前端 ----
      - name: 安装前端依赖
        run: npm ci
        working-directory: web

      - name: 构建前端
        run: npm run build
        working-directory: web

      # ---- 复制前端产物 ----
      - name: 复制前端产物到 ai-service/web_dist
        shell: bash
        run: cp -r web/dist ai-service/web_dist

      # ---- 安装 Python（带 pip 缓存） ----
      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      # ---- 安装 Python 依赖 ----
      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
        working-directory: ai-service

      # ---- PyInstaller 打包（onedir 模式） ----
      - name: PyInstaller 打包
        run: pyinstaller --clean --noconfirm docai.spec
        working-directory: ai-service

      # ---- 打包为 zip（onedir → zip） ----
      - name: 打包为 zip
        shell: pwsh
        run: |
          Compress-Archive -Path "ai-service/dist/DocAI-Pipeline/*" -DestinationPath "ai-service/dist/${{ steps.version.outputs.zip_name }}"

      # ---- 删除同名旧 Release（支持 tag 快进后重新发布） ----
      - name: 删除旧 Release（如存在）
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false 2>/dev/null || true

      # ---- 创建 GitHub Release ----
      - name: 创建 Release
        uses: softprops/action-gh-release@v3
        with:
          name: "DocAI Pipeline v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          make_latest: true
          generate_release_notes: true
          body: |
            ## 使用方式
            1. 下载 `${{ steps.version.outputs.zip_name }}`
            2. 解压到任意目录
            3. 双击 `DocAI-Pipeline.exe` 启动
          files: |
            ai-service/dist/${{ steps.version.outputs.zip_name }}
