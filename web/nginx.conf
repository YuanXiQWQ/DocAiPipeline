server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API 请求反代到后端
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50M;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    # 文件下载
    location /download/ {
        proxy_pass http://backend:8000;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
